name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm install

      - name: Install Python dependencies
        run: python -m pip install -e .[dev]

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run tsc

      - name: Unit tests (web)
        run: npm run vitest

      - name: Unit tests (api)
        run: npm run pytest

      - name: E2E tests
        run: npm run playwright
